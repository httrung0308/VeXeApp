name: vexe_app
description: "VeXe - Bus Ticket Booking App. Premium bus ticket booking experience."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State Management - Riverpod
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI & Fonts
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0

  # Utils
  intl: ^0.20.1
  shared_preferences: ^2.3.5

  # QR Code
  qr_flutter: ^4.1.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
